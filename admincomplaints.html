<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartTrash – Admin Complaints</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6f9;
}

/* HEADER */

header{
background:linear-gradient(135deg,#00695c,#00a896);
color:white;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

header button{
background:white;
color:#00695c;
border:none;
padding:8px 16px;
border-radius:20px;
cursor:pointer;
font-weight:600;
}

/* CONTAINER */

.container{
padding:30px;
max-width:1200px;
margin:auto;
}

/* CARD */

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
margin-bottom:30px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
font-size:14px;
}

th{
background:#f1f5f4;
}

tr:hover{
background:#fafafa;
}

/* IMAGE */

img{
width:70px;
border-radius:8px;
}

/* STATUS */

.status{
padding:6px 12px;
border-radius:15px;
font-size:12px;
font-weight:600;
border:none;
}

.pending{
background:#fff3cd;
color:#856404;
}

.progress{
background:#cce5ff;
color:#004085;
}

.done{
background:#d4edda;
color:#155724;
}

/* CHART */

canvas{
margin-top:20px;
}

</style>
</head>

<body>

<header>

<h2>📋 SmartTrash Complaints Dashboard</h2>

<button onclick="window.location.href='Admin-DashBoard.html'">
⬅ Dashboard
</button>

</header>

<div class="container">

<div class="card">

<h3>User Complaints List</h3>

<table>

<thead>
<tr>
<th>No</th>
<th>Issue</th>
<th>Location</th>
<th>Description</th>
<th>Date</th>
<th>Image</th>
<th>Status</th>
</tr>
</thead>

<tbody id="complaintTable"></tbody>

</table>

</div>


<div class="card">

<h3>Monthly Average Fill Level (%)</h3>

<canvas id="monthlyChart"></canvas>

</div>

</div>


<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyCbhiJIZC0-mZYOAYGwA6mEmkIiE4U5FseCrhnpApIOEFwX_QZHkwKv5vFQ8KNH3I/exec";


async function loadComplaints(){

try{

const res = await fetch(API_URL);
const result = await res.json();
const rows = result.data;

const table = document.getElementById("complaintTable");
table.innerHTML="";

rows.reverse().forEach((row,index)=>{

const time = row.Time;
const issue = row.Issue;
const location = row.Location;
const description = row.Description;
const image = row.imageUrl;

const date=new Date(time).toLocaleDateString();

table.innerHTML+=`

<tr>

<td>${index+1}</td>

<td>${issue}</td>

<td>${location}</td>

<td>${description}</td>

<td>${date}</td>

<td>
${image ? `<a href="${image}" target="_blank">
<img src="${image}">
</a>` : "-"}
</td>

<td>

<select class="status pending" onchange="changeStatus(this)">

<option value="pending">Pending</option>
<option value="progress">In Progress</option>
<option value="done">Resolved</option>

</select>

</td>

</tr>

`;

});

}catch(err){

console.error("Load complaint error:",err);

}

}


function changeStatus(select){

select.className="status "+select.value;

}

loadComplaints();

setInterval(loadComplaints,10000);



const ctx=document.getElementById("monthlyChart");

const monthlyChart=new Chart(ctx,{

type:"bar",

data:{
labels:[],
datasets:[{
label:"Average Fill (%)",
data:[],
backgroundColor:"#00695c"
}]
},

options:{
scales:{
y:{
beginAtZero:true,
max:100
}
}
}

});


async function loadMonthlyData(){

try{

const res=await fetch(API_URL);
const result=await res.json();
const rows=result.data;

const monthly={};

rows.forEach(row=>{

const time=row.Time;
const fill=row.Fill;

if(!time || !fill) return;

const date=new Date(time);

const key=
date.getFullYear()+"-"+
String(date.getMonth()+1).padStart(2,"0");

if(!monthly[key]){

monthly[key]={total:0,count:0};

}

monthly[key].total+=Number(fill);
monthly[key].count++;

});

monthlyChart.data.labels=[];
monthlyChart.data.datasets[0].data=[];

Object.keys(monthly).sort().forEach(month=>{

const avg=Math.round(monthly[month].total / monthly[month].count);

monthlyChart.data.labels.push(month);
monthlyChart.data.datasets[0].data.push(avg);

});

monthlyChart.update();

}catch(err){

console.error("Chart error:",err);

}

}

loadMonthlyData();

</script>

</body>
</html>
