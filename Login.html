<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login - SmartTrash</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f766e,#14b8a6);
}

/* LOGIN CARD */

.login-container{
display:flex;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:800px;
max-width:95%;
}

/* LEFT SIDE */

.login-left{
flex:1;
background:linear-gradient(135deg,#0f766e,#14b8a6);
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
text-align:center;
}

.login-left h1{
font-size:28px;
margin-bottom:10px;
}

.login-left p{
font-size:14px;
opacity:.9;
}

/* RIGHT SIDE */

.login-right{
flex:1;
padding:40px;
}

.login-right h2{
text-align:center;
margin-bottom:25px;
color:#333;
}

.input-group{
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
transition:.3s;
}

input:focus{
border-color:#14b8a6;
outline:none;
box-shadow:0 0 5px rgba(20,184,166,.4);
}

/* BUTTON */

button{
width:100%;
padding:12px;
background:#14b8a6;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0f766e;
transform:translateY(-2px);
}

/* ERROR */

.error{
color:red;
text-align:center;
margin-top:10px;
display:none;
}

/* MOBILE */

@media(max-width:768px){

.login-container{
flex-direction:column;
}

.login-left{
padding:30px;
}

}

</style>
</head>

<body>

<div class="login-container">

<div class="login-left">
<h1>SmartTrash</h1>
<p>Smart Waste Management System</p>
</div>

<div class="login-right">

<h2>Admin Login</h2>

<div class="input-group">
<input type="text" id="username" placeholder="Username">
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password">
</div>

<button onclick="login()">Login</button>

<p class="error" id="error">Invalid username or password</p>

</div>

</div>

<script>

function login(){

const u = document.getElementById("username").value;
const p = document.getElementById("password").value;

if(u === "admin" && p === "12345"){

localStorage.setItem("loggedIn","true");
window.location.href = "Admin-DashBoard.html";

}
else{

document.getElementById("error").style.display="block";

}

}

</script>

</body>
</html>
